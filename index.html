<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Broker in a Box — by RocketPro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}</script>
<style>
  :root{
    --red:#de3341; --red-press:#c02733; --red-soft:rgba(222,51,65,.16);
    --ink:#F3F4F7; --ink2:#C6C8D0; --muted:#8A8D98;
    --bg:#0E0F12; --paper:#141519; --card:#1B1D23; --card2:#242731;
    --line:#26282F; --line2:#333640; --mist:#23262E; --putty:#0E0F12; --ok:#9ed16a; --warn:#e0b54a;
    --green:#a9d16f; --green-soft:rgba(160,206,127,.16); --green-ink:#cfe6a0;
    --blue:#7ea2e8; --blue-soft:rgba(126,162,232,.18);
    --yellow:#ffd76a; --yellow-soft:rgba(255,219,105,.14);
    --field-bg:#1B1D23;
    --shadow:0 1px 2px rgba(0,0,0,.35), 0 12px 34px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--putty); color:var(--ink);
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;}
  #root{width:100%; display:flex; justify-content:center;}
  .phone{width:390px; max-width:100%; aspect-ratio:390/844; max-height:92vh; background:var(--paper,#fff);
    border-radius:46px; border:1px solid var(--line2);
    box-shadow:0 2px 6px rgba(0,0,0,.08), 0 30px 80px rgba(0,0,0,.22);
    overflow:hidden; position:relative; display:flex; flex-direction:column;}
  .notch{position:absolute; top:11px; left:50%; transform:translateX(-50%); width:118px; height:28px; background:#000; border-radius:16px; z-index:9;}
  .statusbar{height:48px; flex:0 0 48px; padding:0 26px; display:flex; align-items:center; justify-content:space-between; font-size:14px; font-weight:600; z-index:5;}
  .screen{flex:1 1 auto; overflow-y:auto; overflow-x:hidden; position:relative;}
  .screen::-webkit-scrollbar{width:0;}
  .pad{padding:4px 20px 122px;}
  .tabbar{flex:0 0 auto; position:absolute; left:0; right:0; bottom:0; height:84px; padding:8px 8px 26px;
    background:rgba(16,17,21,.86); backdrop-filter:saturate(180%) blur(20px); border-top:1px solid var(--line);
    display:flex; justify-content:space-around; z-index:12;}
  .tab{background:none; border:0; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 1px; cursor:pointer; color:var(--muted); flex:1; min-width:0;}
  .tab svg{width:21px; height:21px;}
  .tab span{font-size:9.5px; font-weight:600; white-space:nowrap;}
  .tab.active{color:var(--red);}

  .eyebrow{font-size:11px; font-weight:700; letter-spacing:1.3px; text-transform:uppercase; color:var(--red); margin:0;}
  .h1{font-size:26px; line-height:1.09; font-weight:800; letter-spacing:-.6px; margin:6px 0 0;}
  .h2{font-size:18px; font-weight:800; letter-spacing:-.3px; margin:0;}
  .sub{font-size:13px; line-height:1.5; color:var(--muted); margin:8px 0 0;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow);}
  .row{display:flex; align-items:center;}
  .spacer{flex:1;}

  .btn{appearance:none; border:0; cursor:pointer; font-family:inherit; font-weight:700; font-size:15px; border-radius:14px; padding:15px 18px; display:flex; align-items:center; justify-content:center; gap:9px; width:100%;}
  .btn-primary{background:var(--red); color:#fff;} .btn-primary:active{background:var(--red-press);}
  .btn-ghost{background:var(--mist); color:var(--ink);} .btn-ghost:active{background:var(--line);}
  .btn-dark{background:var(--card2); color:var(--ink); border:1px solid var(--line2);}
  .btn svg{width:18px; height:18px;}
  .btn[disabled]{opacity:.45;}

  .chip{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px;}
  .chip-done{background:var(--green-soft); color:var(--ok);} .chip-now{background:var(--red-soft); color:var(--red);} .chip-next{background:var(--mist); color:var(--muted);}

  .field{width:100%; border:1px solid var(--line2); border-radius:13px; padding:14px 14px; font-size:15px; font-family:inherit; background:var(--card); color:var(--ink); outline:none;}
  .field:focus{border-color:var(--red); box-shadow:0 0 0 3px var(--red-soft);}
  .lbl{font-size:12px; font-weight:700; color:var(--ink2); margin:0 0 7px 2px; display:block;}

  input[type=range]{-webkit-appearance:none; width:100%; height:5px; border-radius:4px; background:var(--line2); outline:none; margin:8px 0;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--red); cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,.25);}
  input[type=range]::-moz-range-thumb{width:22px; height:22px; border:0; border-radius:50%; background:var(--red); cursor:pointer;}

  .seg{display:flex; background:var(--mist); border-radius:12px; padding:4px; gap:4px;}
  .seg button{flex:1; border:0; background:none; font-family:inherit; font-weight:700; font-size:13px; padding:9px; border-radius:9px; cursor:pointer; color:var(--muted);}
  .seg button.on{background:var(--red); color:#fff; box-shadow:none;}

  /* roadmap */
  .stage{position:relative; padding:0 0 0 48px;}
  .stage .line{position:absolute; left:17px; top:6px; bottom:-8px; width:3px; background:var(--line2); border-radius:2px;}
  .stage:last-child .line{display:none;}
  .stage.done .line{background:var(--red);}
  .node{position:absolute; left:6px; top:2px; width:25px; height:25px; border-radius:50%; background:var(--card); border:3px solid var(--line2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:var(--muted); z-index:2;}
  .stage.done .node{background:var(--red); border-color:var(--red); color:#fff;}
  .stage.current .node{border-color:var(--red); color:var(--red); box-shadow:0 0 0 4px var(--red-soft);}
  .scard{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:13px 14px; margin-bottom:13px; box-shadow:var(--shadow); cursor:pointer;}
  .scard.current{border-color:var(--red); box-shadow:0 0 0 1px var(--red), var(--shadow);}

  .task{display:flex; gap:11px; align-items:flex-start; padding:9px 0; cursor:pointer;}
  .check{flex:0 0 22px; width:22px; height:22px; border-radius:7px; border:2px solid var(--line2); display:flex; align-items:center; justify-content:center; margin-top:1px; color:#fff;}
  .task.checked .check{background:var(--red); border-color:var(--red);}
  .task .tl{font-size:13.5px; font-weight:600; line-height:1.35;}
  .task.checked .tl{color:var(--muted); text-decoration:line-through;}
  .task .td{font-size:12px; color:var(--muted); line-height:1.4; margin-top:2px;}

  /* lists / rows */
  .lrow{display:flex; align-items:center; gap:13px; padding:14px 16px; border-bottom:1px solid var(--line); cursor:pointer; text-decoration:none; color:inherit;}
  .lrow:last-child{border-bottom:0;}
  .lrow .ic{width:40px; height:40px; border-radius:11px; background:var(--mist); display:flex; align-items:center; justify-content:center; flex:0 0 40px; color:var(--ink2);}
  .lrow .ic svg{width:19px; height:19px;}
  .lrow b{font-size:14.5px; font-weight:700;}
  .lrow small{font-size:12.5px; color:var(--muted); display:block; margin-top:1px;}

  .stat{background:var(--mist); border-radius:14px; padding:14px;}
  .stat .v{font-size:24px; font-weight:800; letter-spacing:-.6px;}
  .stat .k{font-size:11.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.3px;}

  .backbtn{display:inline-flex; align-items:center; gap:6px; background:none; border:0; font-family:inherit; font-weight:700; font-size:14px; color:var(--ink2); cursor:pointer; padding:6px 0; margin-top:8px;}
  .topbar{flex:0 0 auto; height:46px; padding:0 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line); background:var(--card); z-index:8;}
  .tb-brand{background:none; border:0; font-family:inherit; cursor:pointer; display:inline-flex; align-items:center; gap:8px; font-weight:800; font-size:14px; letter-spacing:-.3px; color:var(--ink); padding:0;}
  .tb-brand .r{width:21px; height:21px; border-radius:6px; background:var(--red); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900;}
  .tb-back{background:none; border:0; font-family:inherit; cursor:pointer; display:inline-flex; align-items:center; gap:4px; font-weight:700; font-size:14px; color:var(--ink2); padding:6px 0;}
  .tb-back svg{width:19px; height:19px;}
  .tb-out{background:var(--mist); border:0; font-family:inherit; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:12.5px; color:var(--ink2); padding:7px 12px; border-radius:20px;}
  .tb-out:active{background:var(--line);}
  .tb-out svg{width:16px; height:16px;}
  .backbtn svg{width:18px; height:18px;}

  /* vendor */
  .vcats{display:flex; flex-wrap:wrap; gap:7px; padding:0; margin:14px 0 4px;}
  .vcats::-webkit-scrollbar{height:0;}
  .vcat{flex:0 0 auto; border:1px solid var(--line2); background:var(--card); border-radius:20px; padding:7px 13px; font-size:12px; font-weight:700; color:var(--ink2); cursor:pointer; white-space:nowrap;}
  .vcat.on{background:var(--red); color:#fff; border-color:var(--red);}
  .vcard{display:flex; gap:12px; align-items:flex-start; padding:14px; border:1px solid var(--line); border-radius:15px; margin-bottom:11px; background:var(--card); box-shadow:var(--shadow); text-decoration:none; color:inherit;}
  .vcard .logo{width:42px; height:42px; border-radius:11px; background:var(--red-soft); color:var(--red); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; flex:0 0 42px;}
  .vcard b{font-size:14.5px; font-weight:800; letter-spacing:-.2px;}
  .vcard .cat{font-size:10.5px; font-weight:700; color:var(--red); text-transform:uppercase; letter-spacing:.4px;}
  .vcard p{font-size:12.5px; color:var(--muted); line-height:1.4; margin:5px 0 0;}
  .vcard .ext{flex:0 0 auto; color:var(--line2); align-self:center;}
  .vcard .ext svg{width:18px; height:18px;}
  .vcard.rec{border-color:var(--red); box-shadow:0 0 0 1px var(--red), 0 6px 18px rgba(229,64,30,.12);}
  .recbadge{display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:800; color:#fff; background:var(--red); padding:3px 8px; border-radius:12px; margin-left:8px; text-transform:none; letter-spacing:0; vertical-align:middle;}
  .ohrow{display:flex; align-items:center; gap:10px; padding:11px 14px; border-bottom:1px solid var(--line);}
  .ohrow:last-child{border-bottom:0;}
  .ohtog{flex:0 0 22px; width:22px; height:22px; border-radius:7px; border:2px solid var(--line2); background:var(--card); display:flex; align-items:center; justify-content:center; color:#fff; cursor:pointer; padding:0;}
  .ohtog.on{background:var(--red); border-color:var(--red);}
  .ohlabel{flex:1; font-size:13.5px; font-weight:600; border:0; background:none; font-family:inherit; color:var(--ink); outline:none; padding:0; min-width:0;}
  .ohamt{display:flex; align-items:center; gap:1px; font-size:13.5px; font-weight:800; color:var(--ink);}
  .ohamt input{width:64px; border:1px solid var(--line2); border-radius:8px; padding:6px 8px; font-family:inherit; font-size:13.5px; font-weight:800; text-align:right; outline:none;}
  .ohamt input:focus{border-color:var(--red);}
  .ohdel{flex:0 0 auto; background:none; border:0; color:var(--muted); cursor:pointer; padding:4px; display:flex;}
  .ohdel svg{width:16px; height:16px;}
  .ohadd{display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:12px; border:0; background:var(--mist); color:var(--red); font-family:inherit; font-weight:700; font-size:13.5px; cursor:pointer;}
  .ohadd svg{width:16px; height:16px;}
  .vbody{display:flex; gap:12px; align-items:flex-start; text-decoration:none; color:inherit; padding:14px 14px 0;}
  .vfoot{display:flex; align-items:center; gap:10px; padding:11px 14px 13px; margin-top:4px; border-top:1px solid var(--line);}
  .vprice{font-size:12.5px; font-weight:800;}
  .vprice small{display:block; font-size:10.5px; font-weight:600; color:var(--muted);}
  .vtoggle{margin-left:auto; border:1.5px solid var(--line2); background:var(--card); color:var(--ink); font-family:inherit; font-weight:700; font-size:12.5px; padding:8px 14px; border-radius:999px; cursor:pointer;}
  .vtoggle.on{background:var(--red); color:#fff; border-color:var(--red);}
  .vamt{display:flex; align-items:center; gap:8px; padding:0 14px 13px;}
  .vamt > span{font-size:12px; font-weight:700; color:var(--ink2);}
  .vamt .amtin{display:flex; align-items:center; gap:1px; margin-left:auto; font-weight:800;}
  .vamt .amtin input{width:80px; border:1px solid var(--line2); border-radius:9px; padding:7px 9px; font-family:inherit; font-weight:800; text-align:right; outline:none;}
  .vamt .amtin input:focus{border-color:var(--red);}
  .vnote{font-size:11.5px; color:var(--muted); padding:0 14px 13px;}
  .thread{max-height:300px; overflow-y:auto; padding-right:2px;}
  .bubble{padding:10px 13px; font-size:13px; line-height:1.45; max-width:80%;}
  .bubble.them{background:var(--mist); border-radius:4px 14px 14px 14px; color:var(--ink);}
  .bubble.me{background:var(--red); color:#fff; border-radius:14px 4px 14px 14px;}
  .composer{display:flex; align-items:center; gap:8px; margin-top:6px; padding-top:12px; border-top:1px solid var(--line);}
  .composer input{flex:1; border:1px solid var(--line2); border-radius:999px; padding:11px 15px; font-family:inherit; font-size:13.5px; outline:none; min-width:0; background:var(--card2); color:var(--ink);}
  .composer input:focus{border-color:var(--red);}
  .sendbtn{flex:0 0 42px; width:42px; height:42px; border-radius:50%; border:0; background:var(--line2); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s;}
  .sendbtn.on{background:var(--red);}
  .sendbtn:disabled{cursor:default;}
  .sendbtn svg{width:19px; height:19px; margin-left:-1px;}
  .fcomposer{border:1px solid var(--line2); border-radius:14px; padding:12px 13px; background:var(--card);}
  .fcomposer textarea{width:100%; border:0; outline:none; resize:none; font-family:inherit; font-size:14px; line-height:1.45; color:var(--ink); min-height:44px; background:transparent;}
  .fcomposer textarea::placeholder{color:var(--muted);}
  .fbar{display:flex; align-items:center; gap:8px; margin-top:8px;}
  .ftag{flex:0 0 auto; border:1px solid var(--line2); background:var(--card); color:var(--ink2); font-family:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer; display:inline-flex; align-items:center; gap:5px;}
  .ftag.on{background:var(--red); color:#fff; border-color:var(--red);}
  .ftag svg{width:13px; height:13px;}
  .fpost{margin-left:auto; border:0; background:var(--red); color:#fff; font-family:inherit; font-weight:800; font-size:13px; padding:9px 18px; border-radius:999px; cursor:pointer;}
  .fpost:disabled{background:var(--line2); cursor:default;}
  .tagrow{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
  .tagchip{border:1px solid var(--line2); background:var(--mist); color:var(--ink2); font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:999px; cursor:pointer;}
  .post{padding:15px; margin-top:11px;}
  .post-head{display:flex; align-items:center; gap:10px;}
  .post-head .nm{font-size:13.5px; font-weight:800;}
  .post-head .mt{font-size:11px; color:var(--muted);}
  .anonav{width:36px;height:36px;border-radius:50%;background:var(--mist);color:var(--muted);display:flex;align-items:center;justify-content:center;flex:0 0 36px;}
  .anonav svg{width:18px;height:18px;}
  .catpill{font-size:10px;font-weight:800;color:var(--red);background:var(--red-soft);padding:3px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.3px;}
  .post-body{font-size:14px;line-height:1.5;color:var(--ink);margin:11px 0 0;}
  .mention{color:var(--red);font-weight:700;}
  .post-foot{display:flex;align-items:center;gap:6px;margin-top:13px;}
  .votes{display:inline-flex;align-items:center;gap:2px;background:var(--mist);border-radius:999px;padding:3px;}
  .vbtn{border:0;background:none;color:var(--muted);cursor:pointer;display:flex;padding:5px;border-radius:50%;}
  .vbtn svg{width:17px;height:17px;}
  .vbtn.up{color:var(--red);}
  .vbtn.down{color:var(--blue);}
  .vscore{font-size:13px;font-weight:800;min-width:20px;text-align:center;}
  .fbtn{border:0;background:var(--mist);color:var(--ink2);font-family:inherit;font-size:12.5px;font-weight:700;padding:8px 13px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .fbtn svg{width:15px;height:15px;}
  .replies{margin-top:13px;padding-top:5px;border-top:1px solid var(--line);}
  .reply{display:flex;gap:9px;margin-top:12px;}
  .reply .rb{flex:1;}
  .reply .rmeta{font-size:11.5px;color:var(--muted);margin-bottom:2px;}
  .reply .rmeta b{color:var(--ink);font-size:12.5px;}
  .reply .rtext{font-size:13px;line-height:1.45;}
  .rvotes{display:inline-flex;align-items:center;gap:1px;margin-top:5px;}
  .rvotes button{border:0;background:none;color:var(--muted);cursor:pointer;display:flex;padding:2px;}
  .rvotes button.up{color:var(--red);}
  .rvotes button.down{color:var(--blue);}
  .rvotes svg{width:14px;height:14px;}
  .rvotes span{font-size:12px;font-weight:800;margin:0 3px;}
  .rcompose{display:flex;align-items:center;gap:8px;margin-top:13px;}
  .rcompose input{flex:1;border:1px solid var(--line2);border-radius:999px;padding:9px 13px;font-family:inherit;font-size:13px;outline:none;min-width:0;background:var(--card2);color:var(--ink);}
  .rcompose input:focus{border-color:var(--red);}
  .iopts{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
  .iopt{text-align:left; border:1.5px solid var(--line2); background:var(--card); color:var(--ink); font-family:inherit; font-size:14px; font-weight:600; padding:13px 15px; border-radius:13px; cursor:pointer;}
  .iopt.on{border-color:var(--red); background:var(--red-soft); color:var(--ink);}
  .tabdot{position:absolute; top:-3px; right:-4px; width:8px; height:8px; border-radius:50%; background:var(--red); border:1.5px solid #fff;}
  .stagelink{border:1px solid var(--line2); background:var(--card); color:var(--ink); font-family:inherit; font-size:12.5px; font-weight:700; padding:9px 13px; border-radius:999px; cursor:pointer; display:inline-flex; align-items:center; gap:5px;}
  .stagelink:hover{border-color:var(--red); color:var(--red);}
  .ftoast{display:flex; align-items:center; gap:7px; margin-top:10px; background:var(--green-soft); border:1px solid var(--green); color:var(--green-ink); font-size:12.5px; font-weight:700; padding:9px 13px; border-radius:11px;}
  .onboard .goalpill{display:inline-block; margin-top:16px; font-size:10.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--red); background:var(--red-soft); padding:6px 12px; border-radius:999px;}
  .oform{margin-top:18px; display:flex; flex-direction:column; gap:14px;}
  .frow2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  select.field{appearance:none; -webkit-appearance:none; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%237A7A83' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>"); background-repeat:no-repeat; background-position:right 14px center; padding-right:40px;}
  .finelegal{font-size:10.5px; color:var(--muted); margin-top:14px; padding-bottom:12px; line-height:1.55; text-align:center;}
  .fieldhint{font-size:11px; color:var(--muted); margin:8px 2px 0; line-height:1.5;}
  .nmlsreveal{margin-top:14px; animation:revealField .32s cubic-bezier(.2,.7,.2,1);}
  @keyframes revealField{from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:none;}}
  .rmprog{display:flex; align-items:center; gap:11px; margin-top:16px;}
  .rmprog-bar{flex:1; height:7px; border-radius:5px; background:var(--mist); overflow:hidden;}
  .rmprog-fill{height:100%; background:var(--red); border-radius:5px; transition:width .5s ease;}
  .rmprog-lab{font-size:11.5px; font-weight:700; color:var(--muted); flex:0 0 auto;}
  .ocard{margin-top:14px; background:var(--card2); border:1px solid var(--line2); border-radius:14px; padding:12px 13px; display:flex; flex-direction:column; gap:9px;}
  .orow{display:flex; align-items:flex-start; gap:9px; font-size:12.5px; line-height:1.45; color:var(--ink);}
  .odot{flex:0 0 20px; width:20px; height:20px; border-radius:50%; background:var(--red-soft); color:var(--red); display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .odot.alt{background:var(--mist); color:var(--muted);}
  .srow{display:flex; align-items:baseline; justify-content:space-between; margin-top:18px;}
  .shead{font-size:13px; font-weight:800; letter-spacing:-.2px; color:var(--ink);}
  .tlink{display:inline-flex; align-items:center; gap:5px; margin-top:7px; background:none; border:0; padding:0; font-family:inherit; font-size:12px; font-weight:700; color:var(--red); cursor:pointer; text-decoration:none;}
  .tlink:active{opacity:.65;}
  .pdmhelp{width:100%; display:flex; align-items:center; gap:11px; margin-top:16px; padding:12px 13px; background:var(--red-soft); border:1px solid rgba(222,51,65,.28); border-radius:14px; cursor:pointer; font-family:inherit; color:var(--ink);}
  .pdmhelp-cta{flex:0 0 34px; width:34px; height:34px; border-radius:50%; background:var(--red); color:#fff; display:flex; align-items:center; justify-content:center;}
  .nextcard{margin-top:16px; background:var(--card); border:1px solid var(--line2); border-radius:18px; padding:18px; box-shadow:var(--shadow); cursor:pointer; position:relative; overflow:hidden;}
  .nextcard:before{content:''; position:absolute; right:-46px; top:-46px; width:150px; height:150px; background:radial-gradient(circle, var(--red-soft), transparent 70%); pointer-events:none;}
  .nextkick{font-size:11px; font-weight:800; letter-spacing:.13em; color:var(--red); text-transform:uppercase; position:relative;}
  .nextstage{font-size:11px; font-weight:700; color:var(--muted); position:relative;}
  .nexttitle{font-size:22px; font-weight:800; letter-spacing:-.6px; margin-top:9px; position:relative;}
  .nextsub{font-size:13px; color:var(--muted); margin-top:3px; position:relative;}

  .hrow-t{display:block; font-size:14px; font-weight:700; color:var(--ink);}
  .hrow-s{display:block; font-size:11.5px; color:var(--muted); margin-top:1px;}

  .pdmrow-cta{display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:800; color:var(--red); flex:0 0 auto;}

  /* pdm */
  .pdm{background:linear-gradient(135deg,#1A1A1F 0%, #2A2A30 100%); border-radius:20px; padding:18px; color:#fff; position:relative; overflow:hidden;}
  .pdm .glow{position:absolute; right:-40px; top:-40px; width:150px; height:150px; background:radial-gradient(circle, rgba(229,64,30,.5), transparent 70%);}
  .av{width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--red),#F08A2E); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; flex:0 0 56px;}
  .pa{background:rgba(255,255,255,.12); border:0; border-radius:12px; padding:11px 6px; color:#fff; display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; font-size:11px; font-weight:600; text-decoration:none;}
  .pa:active{background:rgba(255,255,255,.22);}
  .pa svg{width:17px; height:17px;}
  .synced{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--ok); background:var(--green-soft); padding:5px 10px; border-radius:20px;}

  .bm{display:inline-flex; align-items:center; gap:7px; font-weight:800; letter-spacing:-.3px; font-size:15px;}
  .bm .r{width:22px; height:22px; border-radius:6px; background:var(--red); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900;}

  .sheet-bg{position:absolute; inset:0; background:rgba(17,17,20,.42); z-index:20; display:flex; align-items:flex-end;}
  .sheet{background:var(--card); width:100%; border-radius:24px 24px 0 0; padding:6px 20px 28px; max-height:84%; overflow-y:auto; animation:up .26s cubic-bezier(.2,.8,.2,1) both;}
  .sheet::-webkit-scrollbar{width:0;}
  @keyframes up{from{transform:translateY(100%);} to{transform:none;}}
  .grab{width:36px; height:5px; border-radius:3px; background:var(--line2); margin:8px auto 12px;}
  .fade{animation:fade .35s ease both;}
  @keyframes fade{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){.fade,.sheet{animation:none !important;}}

  .signin{flex:1; display:flex; flex-direction:column; padding:0 26px 30px; overflow-y:auto;}

  .sfmap{font-size:10.5px; font-weight:700; color:var(--muted); font-family:var(--mono,ui-monospace,monospace);}
  .spin{width:16px; height:16px; flex:0 0 16px; border:2px solid var(--line2); border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite;}

  .stchip button svg{width:14px; height:14px;}

    const tick=()=>{const d=new Date();let h=d.getHours()%12; if(h===0)h=12; setT(h+':'+String(d.getMinutes()).padStart(2,'0'));};
    tick(); const id=setInterval(tick,15000); return ()=>clearInterval(id);
  },[]);
  return <span>{t}</span>;
}

function Avatar({photo,initials,size=56,bg}){
  const [err,setErr]=useState(false);
  const style={width:size,height:size,flex:'0 0 '+size+'px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:Math.round(size*0.36),overflow:'hidden',color:'#fff',background:bg||'linear-gradient(135deg,var(--red),#F08A2E)'};
  if(photo && !err) return <div style={style}><img src={photo} alt={initials} onError={()=>setErr(true)} style={{width:'100%',height:'100%',objectFit:'cover'}}/></div>;
  return <div style={style}>{initials}</div>;
}

function Logo({variant,height}){
  const mark = variant==='mark';
  const vb = mark ? '0 0 200 173.687' : '0 0 553.728 173.687';
  const h = height || (mark?20:34);
  return <svg viewBox={vb} height={h} style={{display:'block'}} xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rocket Pro"><path fill="#de3341" fillRule="nonzero" d={RP_PATH}/></svg>;
}

const store = {
  get(k,d){ try{ const v=localStorage.getItem('biab.'+k); return v==null?d:JSON.parse(v); }catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem('biab.'+k, JSON.stringify(v)); }catch(e){} },
  clear(){ try{ Object.keys(localStorage).filter(k=>k.indexOf('biab.')===0).forEach(k=>localStorage.removeItem(k)); }catch(e){} },
};

function App(){
  const [onboarded,setOnboarded]=useState(()=>store.get('onboarded',false));
  const [me,setMe]=useState(()=>store.get('me',{name:'',firstName:'',lastName:'',email:'',phone:'',states:[],licensed:null,hearAbout:'',nmls:'',goal:'brokerage'}));
  const [tab,setTab]=useState('home');
  const [toolsView,setToolsView]=useState('hub');
  const [done,setDone]=useState(()=>store.get('done',{}));
  const [openStage,setOpenStage]=useState(null);
  const [appliedBps,setAppliedBps]=useState(null);
  const [prof,setProf]=useState(()=>store.get('prof',{fields:{},auto:[],saved:false,fileName:''}));
  const [using,setUsing]=useState(()=>store.get('using',{}));
  const [oh,setOh]=useState(()=>store.get('oh',OH_SEED));
  const [posts,setPosts]=useState(()=>store.get('posts',SEED_POSTS));
  const [convos,setConvos]=useState(()=>store.get('convos',{PDM:seedThread('PDM'),AE:seedThread('AE')}));
  const [unread,setUnread]=useState(()=>store.get('unread',0));

  useEffect(()=>store.set('onboarded',onboarded),[onboarded]);
  useEffect(()=>store.set('me',me),[me]);
  useEffect(()=>store.set('done',done),[done]);
  useEffect(()=>store.set('prof',prof),[prof]);
  useEffect(()=>store.set('using',using),[using]);
  useEffect(()=>store.set('oh',oh),[oh]);
  useEffect(()=>store.set('posts',posts),[posts]);
  useEffect(()=>store.set('convos',convos),[convos]);
  useEffect(()=>store.set('unread',unread),[unread]);

  if(!onboarded) return <Phone><Onboard me={me} onDone={(info)=>{ setMe(info); if(info.licensed===true){ const d={}; ['explore','license'].forEach(k=>{ const st=STAGES.find(s=>s.key===k); if(st) st.tasks.forEach((_,i)=>{d[k+':'+i]=true;}); }); setDone(d); } setOnboarded(true); }}/></Phone>;

  const go=(t)=>{ setTab(t); if(t!=='tools') setToolsView('hub'); };
  const openTool=(v)=>{ setTab('tools'); setToolsView(v); };
  const logout=()=>{ store.clear(); setOnboarded(false); setMe({name:'',firstName:'',lastName:'',email:'',phone:'',states:[],licensed:null,hearAbout:'',nmls:'',goal:'brokerage'}); setTab('home'); setToolsView('hub'); setOpenStage(null); setDone({}); setAppliedBps(null); setProf({fields:{},auto:[],saved:false,fileName:''}); setUsing({}); setOh(OH_SEED); setPosts(SEED_POSTS); setConvos({PDM:seedThread('PDM'),AE:seedThread('AE')}); setUnread(0); };
  const inSub = tab==='tools' && toolsView!=='hub';
  const goBack=()=>{ if(inSub) setToolsView('hub'); };

  const stageStatus = STAGES.map(s=>{
    const d=s.tasks.filter((_,i)=>done[s.key+':'+i]).length;
    return {c:d===s.tasks.length, d, t:s.tasks.length};
  });
  const currentIdx = (()=>{const i=stageStatus.findIndex(s=>!s.c); return i===-1?STAGES.length-1:i;})();
  const totalTasks = STAGES.reduce((a,s)=>a+s.tasks.length,0);
  const pct = Math.round(Object.values(done).filter(Boolean).length/totalTasks*100);
  const toggle=(k,i)=>setDone(p=>({...p,[k+':'+i]:!p[k+':'+i]}));
  const approveStage = STAGES.find(s=>s.key==='approve');
  const approved = approveStage.tasks.every((_,i)=>done['approve:'+i]);
  const contact = approved ? AE : PDM;
  const setContactConvo=(updater)=>setConvos(c=>({...c,[contact.kind]: typeof updater==='function'?updater(c[contact.kind]):updater}));
  const notifyRep=()=>{ setConvos(c=>({...c,[contact.kind]:[...c[contact.kind],{from:'them',text:'Saw you tagged me in the community — I\'ll jump in with an answer.'}]})); setUnread(u=>u+1); };

  return (
    <Phone>
      <TopBar inSub={inSub} goBack={goBack} goHome={()=>go('home')} logout={logout}/>
      <div className="screen">
        {tab==='home' && <Home pct={pct} cur={STAGES[currentIdx]} go={go} openTool={openTool} openStage={setOpenStage} contact={contact} approved={approved} me={me} posts={posts}/>}
        {tab==='map' && <Roadmap stageStatus={stageStatus} currentIdx={currentIdx} openStage={setOpenStage}/>}
        {tab==='tools' && <Tools view={toolsView} setView={setToolsView} appliedBps={appliedBps} setAppliedBps={setAppliedBps} openTool={openTool} prof={prof} setProf={setProf} using={using} oh={oh} setOh={setOh} go={go} licStates={me.states||[]} setLicStates={(u)=>setMe(m=>({...m, states: typeof u==='function'?u(m.states||[]):u}))}/>}
        {tab==='market' && <Market using={using} setUsing={setUsing} openTool={openTool}/>}
        {tab==='community' && <Community posts={posts} setPosts={setPosts} contact={contact} me={me} notifyRep={notifyRep}/>}
        {tab==='pdm' && <Connect key={contact.kind} contact={contact} approved={approved} me={me} convo={convos[contact.kind]} setConvo={setContactConvo} clearUnread={()=>setUnread(0)}/>}
      </div>

      {openStage && <StageSheet stage={openStage} done={done} toggle={toggle} close={()=>setOpenStage(null)} goPDM={()=>{setOpenStage(null);go('pdm');}} contact={contact} openTool={(v)=>{setOpenStage(null);openTool(v);}} goTab={(t)=>{setOpenStage(null);go(t);}} onNext={()=>{ const i=STAGES.findIndex(s=>s.key===openStage.key); const nx=STAGES[i+1]; setDone(d=>{ const nd={...d}; openStage.tasks.forEach((_,k)=>{nd[openStage.key+':'+k]=true;}); return nd; }); setOpenStage(nx||null); }}/>}

      <div className="tabbar">
        {[['home','Home',I.home],['map','Roadmap',I.map],['tools','Tools',I.tools],['market','Vendors',I.store],['community','Forum',I.forum],['pdm',contact.short,I.pdm]].map(([k,l,Ic])=>(
          <button key={k} className={'tab'+(tab===k?' active':'')} onClick={()=>go(k)}><span style={{position:'relative',display:'flex'}}><Ic/>{k==='pdm'&&unread>0&&<span className="tabdot"></span>}</span><span>{l}</span></button>
        ))}
      </div>
    </Phone>
  );
}

function Phone({children}){
  return (
    <div className="phone">

          <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#111"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1" fill="#111"/><rect x="9" y="2" width="3" height="10" rx="1" fill="#111"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#111"/></svg>
          <svg width="22" height="12" viewBox="0 0 22 12"><rect x="1" y="1" width="18" height="10" rx="2.5" stroke="#111" strokeOpacity=".4" fill="none"/><rect x="2.5" y="2.5" width="13" height="7" rx="1.4" fill="#111"/><rect x="20" y="4" width="1.5" height="4" rx="1" fill="#111" fillOpacity=".4"/></svg>
        </span>
      </div>
      {children}

  );
}

function TopBar({inSub,goBack,goHome,logout}){
  return (
    <div className="topbar">
      {inSub

        : <button className="tb-brand" onClick={goHome}><Logo variant="mark" height={20}/> Broker in a Box</button>}
      <span className="spacer"></span>
      <button className="tb-out" onClick={logout}><I.out/> Log out</button>
    </div>
  );
}
const HEAR_OPTS=['Referral','Online Search','Social Media','Convention','BrokerNearMe.com','Other'];
function Onboard({me,onDone}){
  const [first,setFirst]=useState(me.firstName||'');
  const [last,setLast]=useState(me.lastName||'');
  const [email,setEmail]=useState(me.email||'');
  const [phone,setPhone]=useState(me.phone||'');
  const [states,setStates]=useState(Array.isArray(me.states)?me.states:[]);
  const [licensed,setLicensed]=useState(typeof me.licensed==='boolean'?me.licensed:null);
  const [hear,setHear]=useState(me.hearAbout||'');
  const [nmls,setNmls]=useState(me.nmls||'');
  const ready = first.trim() && last.trim() && email.trim() && (licensed!==true || nmls.trim());
  const addState=(v)=>{ if(v && !states.includes(v)) setStates([...states,v].sort()); };
  const removeState=(v)=>setStates(states.filter(s=>s!==v));
  const submit=()=>{ if(!ready) return; onDone({ name:(first.trim()+' '+last.trim()).trim(), firstName:first.trim(), lastName:last.trim(), email:email.trim(), phone:phone.trim(), states, licensed, nmls:licensed===true?nmls.trim():'', hearAbout:hear, goal:'brokerage' }); };
  return (
    <div className="signin fade onboard" style={{overflowY:'auto'}}>
      <div style={{paddingTop:24}}>
        <Logo height={32}/>
        <span className="goalpill">Your goal · Open your own brokerage</span>
        <h1 className="h1" style={{fontSize:30,marginTop:14,letterSpacing:'-1px'}}>Let's start the conversation.</h1>
        <p className="sub">Tell us a bit about you and we'll build your path — and match you with a Partner Development Manager. Prefer to talk? Call <b style={{color:'var(--ink)'}}>(833) 337-5257</b>.</p>
      </div>
      <div className="oform">
        <div className="frow2">
          <div><label className="lbl">First name</label><input className="field" value={first} onChange={e=>setFirst(e.target.value)} placeholder="First"/></div>
          <div><label className="lbl">Last name</label><input className="field" value={last} onChange={e=>setLast(e.target.value)} placeholder="Last"/></div>
        </div>
        <div><label className="lbl">Email address</label><input className="field" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com"/></div>
        <div><label className="lbl">Phone number</label><input className="field" type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="(555) 555-0123"/></div>
        <div>
          <label className="lbl">In which states do you intend to operate?</label>
          <select className="field select" value="" onChange={e=>{addState(e.target.value); e.target.value='';}} style={{color:'var(--muted)'}}>
            <option value="">Add a state…</option>
            {US_STATES.filter(s=>!states.includes(s[0])).map(s=><option key={s[0]} value={s[0]} style={{color:'var(--ink)'}}>{s[1]}</option>)}
          </select>
          {states.length>0 && <div style={{display:'flex',flexWrap:'wrap',gap:7,marginTop:10}}>
            {states.map(ab=><span key={ab} className="stchip">{ab}<button onClick={()=>removeState(ab)} aria-label={'Remove '+ab}><I.x/></button></span>)}
          </div>}
          <p className="fieldhint">{states.length>0? states.length+(states.length===1?' state':' states')+' selected · these flow straight into your license checklist.' : 'Pick one or more. These flow straight into your license checklist.'}</p>
        </div>
        <div>
          <label className="lbl">Are you licensed with the NMLS?</label>
          <div className="seg" style={{maxWidth:200}}>
            <button className={licensed===true?'on':''} onClick={()=>setLicensed(true)}>Yes</button>
            <button className={licensed===false?'on':''} onClick={()=>setLicensed(false)}>No</button>
          </div>
          {licensed===true && (
            <div className="nmlsreveal">
              <label className="lbl">Your NMLS ID <span style={{color:'var(--red)'}}>*</span></label>
              <input className="field" inputMode="numeric" value={nmls} onChange={e=>setNmls(e.target.value.replace(/[^0-9]/g,''))} placeholder="e.g. 1234567" autoFocus/>
              <p className="fieldhint">We'll use this to pull your record and pre-fill your profile. Required to continue.</p>
            </div>
          )}
        </div>
        <div>
          <label className="lbl">How did you hear about us?</label>
          <select className="field select" value={hear} onChange={e=>setHear(e.target.value)} style={{color:hear?'var(--ink)':'var(--muted)'}}>
            <option value="">Select one</option>
            {HEAR_OPTS.map(o=><option key={o} value={o} style={{color:'var(--ink)'}}>{o}</option>)}
          </select>
        </div>
      </div>
      <button className="btn btn-primary" style={{marginTop:18}} disabled={!ready} onClick={submit}>Start my journey <I.chev/></button>
      <p className="finelegal">Prototype — production submits this to Rocket Pro and creates your partner record. By continuing you agree to be contacted about partnering with Rocket Pro.</p>
    </div>
  );
}

        <circle cx="32" cy="32" r={r} stroke="var(--red)" strokeWidth="6" fill="none" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset .6s ease'}}/>
      </svg>

  return (

                    <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',letterSpacing:'.4px',textTransform:'uppercase'}}>Step {s.n}</div>
                    <div style={{fontSize:16,fontWeight:800,letterSpacing:'-.3px',display:'flex',alignItems:'center',gap:6,marginTop:2}}>{s.title}{s.rocket&&<I.rocket style={{width:14,height:14,color:'var(--red)'}}/>}</div>

function TaskLink({link,openTool,goTab}){
  if(!link) return null;
  if(link.url) return <a className="tlink" href={link.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}>{link.label} <I.ext style={{width:12,height:12}}/></a>;
  return <button className="tlink" onClick={e=>{e.stopPropagation(); link.tab?goTab(link.tab):openTool(link.v);}}>{link.label} <I.chev style={{width:12,height:12}}/></button>;
}
function StageSheet({stage,done,toggle,close,goPDM,contact,openTool,goTab,onNext}){
  const links = STAGE_LINKS[stage.key]||[];
  const idx = STAGES.findIndex(s=>s.key===stage.key);
  const next = STAGES[idx+1];
  const allDone = stage.tasks.length>0 && stage.tasks.every((_,i)=>!!done[stage.key+':'+i]);
  const doneN = stage.tasks.filter((_,i)=>!!done[stage.key+':'+i]).length;
  const first = contact.name.split(' ')[0];
  return (
    <div className="sheet-bg" onClick={close}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="grab"></div>
        <p className="eyebrow">Step {stage.n} of {STAGES.length} · {stage.time}</p>
        <h2 className="h2" style={{fontSize:23,marginTop:4,display:'flex',alignItems:'center',gap:8}}>{stage.title}{stage.rocket&&<I.rocket style={{width:18,height:18,color:'var(--red)'}}/>}</h2>
        <p className="sub" style={{marginTop:7,color:'var(--ink2)'}}>{stage.plain}</p>

        <div className="ocard">
          <div className="orow"><span className="odot"><I.check style={{width:12,height:12}}/></span><span>When this is done: <b>{stage.outcome}</b></span></div>
          <div className="orow"><span className="odot alt"><I.tag style={{width:12,height:12}}/></span><span style={{color:'var(--muted)'}}>{stage.cost}</span></div>
        </div>

        <div className="srow">
          <span className="shead">Do these in order</span>
          <span style={{fontSize:11.5,fontWeight:700,color:'var(--muted)'}}>{doneN}/{stage.tasks.length}</span>
        </div>
        <div style={{marginTop:4}}>
          {stage.tasks.map((t,i)=>{const c=!!done[stage.key+':'+i];return (
            <div key={i} className={'task'+(c?' checked':'')} onClick={()=>toggle(stage.key,i)}>
              <div className="check">{c&&<I.check style={{width:14,height:14}}/>}</div>
              <div style={{flex:1}}>
                <div className="tl">{t.t}</div>
                <div className="td">{t.d}</div>
                <TaskLink link={t.link} openTool={openTool} goTab={goTab}/>
              </div>
            </div>);})}
        </div>

        {links.length>0 && <div style={{marginTop:16}}>
          <div className="shead" style={{marginBottom:9}}>Tools for this step</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {links.map((l,i)=><button key={i} className="stagelink" onClick={()=> l.tab?goTab(l.tab):openTool(l.v)}>{l.t} <I.chev style={{width:14,height:14}}/></button>)}
          </div>
        </div>}

        <button className="pdmhelp" onClick={goPDM}>
          <Avatar photo={contact.photo} initials={contact.initials} size={40}/>
          <div style={{flex:1,textAlign:'left'}}>
            <div style={{fontSize:13,fontWeight:800}}>Have a question on this step?</div>
            <div style={{fontSize:12,color:'var(--ink2)',marginTop:1,lineHeight:1.4}}>{first} has walked hundreds of LOs through this — ask anytime.</div>
          </div>
          <span className="pdmhelp-cta"><I.chat style={{width:15,height:15}}/></span>
        </button>

        {next
          ? <button className="btn btn-primary" style={{marginTop:14}} onClick={onNext}>{allDone?'Complete & continue':'Next step'} <I.chev/></button>
          : <button className="btn btn-primary" style={{marginTop:14}} onClick={onNext}><I.check style={{width:16,height:16}}/> Finish — you're a Rocket Pro partner</button>}
        {next && <p style={{fontSize:12,color:'var(--muted)',textAlign:'center',margin:'8px 0 0'}}>Up next · <b style={{color:'var(--ink2)',fontWeight:700}}>{next.title}</b></p>}
        <button className="btn btn-ghost" style={{marginTop:11}} onClick={close}>Close</button>
      </div>
    </div>
  );

/* ----- calculator ----- */
function Calculator({back,appliedBps,using,oh,setOh,goMarket}){
  const [loan,setLoan]=useState(360000);
  const [units,setUnits]=useState(6);
  const [bps,setBps]=useState(appliedBps||200);
  useEffect(()=>{ if(appliedBps) setBps(appliedBps); },[appliedBps]);

  const usedVendors = VENDORS.filter(v=>v.n in using);
  const vendorCost = usedVendors.reduce((s,v)=>s+(+using[v.n]||0),0);
  const ohCost = oh.filter(o=>o.on).reduce((s,o)=>s+(+o.cost||0),0);
  const overhead = vendorCost + ohCost;

  const perLoan = loan*bps/10000;
  const grossM = perLoan*units;
  const netM = grossM-overhead;
  const grossY = grossM*12;
  const netY = netM*12;

  const setItem=(id,patch)=>setOh(oh.map(o=>o.id===id?{...o,...patch}:o));
  const addItem=()=>setOh([...oh,{id:'c'+Date.now(),label:'',cost:0,on:true,custom:true}]);
  const delItem=(id)=>setOh(oh.filter(o=>o.id!==id));

  return (
    <Sub back={back} title="Compensation estimator" sub="A quick income model. Gross of taxes and any splits — an estimate, not a guarantee.">
      <div className="card" style={{padding:16,marginTop:16}}>
        <SliderRow label="Average loan amount" value={money(loan)} min={100000} max={900000} step={10000} val={loan} set={setLoan}/>
        <SliderRow label="Loans per month" value={units} min={1} max={40} step={1} val={units} set={setUnits}/>
        <SliderRow label="Broker comp" value={(bps/100).toFixed(2)+'% · '+bps+' bps'} min={50} max={300} step={5} val={bps} set={setBps} last/>
      </div>

      <div className="row" style={{marginTop:20}}>
        <span style={{fontSize:15,fontWeight:800}}>Monthly overhead</span><span className="spacer"></span>
        <span style={{fontSize:16,fontWeight:800}}>{money(overhead)}</span>
      </div>

      <div style={{fontSize:12,fontWeight:800,color:'var(--muted)',letterSpacing:'.3px',margin:'14px 0 7px'}}>FROM VENDORS YOU USE</div>
      {usedVendors.length===0 ? (
        <div className="card" style={{padding:'13px 15px',fontSize:12.5,color:'var(--muted)',lineHeight:1.5}}>Mark the vendors you use in the Marketplace and their cost flows in here. <span style={{color:'var(--red)',fontWeight:700,cursor:'pointer'}} onClick={goMarket}>Open Marketplace →</span></div>
      ) : (
        <div className="card" style={{overflow:'hidden'}}>
          {usedVendors.map(v=>{
            const u=v.price.unit;
            return (
              <div key={v.n} className="ohrow">
                <div style={{flex:1}}><div style={{fontSize:13.5,fontWeight:700}}>{v.n}</div><div style={{fontSize:11.5,color:'var(--muted)'}}>{u==='free'?'Free for partners':u==='deal'?'Per deal — not in monthly':'Custom quote'}</div></div>
                <span style={{fontSize:14,fontWeight:800}}>{u==='deal'?'—':money(+using[v.n]||0)}</span>
              </div>
            );
          })}
          <div className="ohrow" style={{borderTop:'1px solid var(--line)'}}><span style={{fontSize:13,fontWeight:700,color:'var(--muted)'}}>Vendor subtotal</span><span className="spacer"></span><span style={{fontSize:14,fontWeight:800}}>{money(vendorCost)}</span></div>
        </div>
      )}
      <p style={{fontSize:11,color:'var(--muted)',margin:'7px 0 0'}}>Tip: enter your real quote for “Custom” vendors on their Marketplace card.</p>

      <div style={{fontSize:12,fontWeight:800,color:'var(--muted)',letterSpacing:'.3px',margin:'18px 0 7px'}}>OTHER MONTHLY COSTS · ESTIMATES</div>
      <div className="card" style={{overflow:'hidden'}}>
        {oh.map(o=>(
          <div key={o.id} className="ohrow">
            <button className={'ohtog'+(o.on?' on':'')} onClick={()=>setItem(o.id,{on:!o.on})}>{o.on&&<I.check style={{width:13,height:13}}/>}</button>
            {o.custom
              ? <input className="ohlabel" value={o.label} placeholder="Add a cost…" onChange={e=>setItem(o.id,{label:e.target.value})}/>
              : <span className="ohlabel" style={{opacity:o.on?1:.5}}>{o.label}</span>}
            <div className="ohamt"><span>$</span><input value={o.cost} onChange={e=>setItem(o.id,{cost:Math.max(0,+e.target.value||0)})} inputMode="numeric"/></div>
            {o.custom && <button className="ohdel" onClick={()=>delItem(o.id)} aria-label="Remove"><I.x/></button>}
          </div>
        ))}
        <button className="ohadd" onClick={addItem}><I.plus/> Add a cost</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11,marginTop:18}}>
        <div className="stat"><div className="k">Per loan</div><div className="v">{money(perLoan)}</div></div>
        <div className="stat"><div className="k">Gross / month</div><div className="v">{money(grossM)}</div></div>
      </div>
      <div className="card" style={{marginTop:11,padding:16,background:'#0A0B0E',color:'#fff',border:'1px solid var(--line2)'}}>
        <div className="row"><div style={{flex:1}}><div style={{fontSize:11.5,fontWeight:700,opacity:.7,textTransform:'uppercase',letterSpacing:'.3px'}}>Net annual income</div><div style={{fontSize:30,fontWeight:800,letterSpacing:'-.8px',marginTop:2,color:netY<0?'#FF7A5C':'#fff'}}>{money(netY)}</div></div>
        <div style={{textAlign:'right'}}><div style={{fontSize:11,opacity:.65}}>Net / month</div><div style={{fontSize:15,fontWeight:700,color:netM<0?'#FF7A5C':'#fff'}}>{money(netM)}</div></div></div>
        <div className="row" style={{marginTop:12,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.15)',fontSize:12,opacity:.8}}><span>Gross / yr {money(grossY)}</span><span className="spacer"></span><span>Overhead {money(overhead*12)}/yr</span></div>
      </div>
      <p style={{fontSize:11.5,color:'var(--muted)',marginTop:12,lineHeight:1.5}}>Cost estimates are editable starting points — adjust to your real numbers. Pull a comp benchmark from Average comp by ZIP to refine the income side.</p>
    </Sub>
  );
}
function SliderRow({label,value,min,max,step,val,set,last}){
  return (
    <div style={{paddingBottom:last?0:14,marginBottom:last?0:14,borderBottom:last?'none':'1px solid var(--line)'}}>
      <div className="row"><span className="lbl" style={{margin:0}}>{label}</span><span className="spacer"></span><span style={{fontSize:14,fontWeight:800}}>{value}</span></div>
      <input type="range" min={min} max={max} step={step} value={val} onChange={e=>set(Number(e.target.value))}/>

/* ----- comp by ZIP ----- */
function ZipComp({back,useInCalc}){
  const [zip,setZip]=useState('');
  const [st,setSt]=useState('');
  const [res,setRes]=useState(null);
  const nat=COMP.nat;

  const lookupZip=()=>{
    const z=(zip.match(/\d/g)||[]).join('').slice(0,5);
    if(z.length<5){ setRes({err:'Enter a 5-digit ZIP code.'}); return; }
    if(COMP.ezip[z]){ const e=COMP.ezip[z]; setRes({scope:'ZIP '+z, exact:true, ...e}); return; }
    const z3=z.slice(0,3);
    if(COMP.zip3[z3]){ const e=COMP.zip3[z3]; setRes({scope:'ZIP area '+z3+'xx', ...e}); return; }
    setRes({err:'No partner shops on file for that ZIP yet. Try a state below.'});
  };
  const lookupState=(s)=>{ setSt(s); if(s&&COMP.state[s]){ const e=COMP.state[s]; setRes({scope:s+' statewide', ...e}); } };

  const states=Object.keys(COMP.state).sort();
  const delta = res&&!res.err ? (res.avgComp-nat.avgComp) : 0;

  return (
    <Sub back={back} title="Average comp by ZIP" sub="Typical broker comp on Rocket Pro partner shops near you. National average is 2.10%.">
      <div className="card" style={{padding:16,marginTop:16}}>
        <label className="lbl">ZIP code</label>
        <div className="row" style={{gap:9}}>
          <input className="field" inputMode="numeric" value={zip} onChange={e=>setZip(e.target.value)} placeholder="e.g. 48226" style={{flex:1}}/>
          <button className="btn btn-primary" style={{width:'auto',padding:'14px 18px'}} onClick={lookupZip}>Look up</button>
        </div>
        <div className="row" style={{gap:9,marginTop:12}}>
          <span className="lbl" style={{margin:0,whiteSpace:'nowrap'}}>Or by state</span>
          <select className="field" value={st} onChange={e=>lookupState(e.target.value)} style={{flex:1}}>
            <option value="">Select…</option>
            {states.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
      </div>

      {res && (res.err ? (
        <div className="card" style={{padding:16,marginTop:14,color:'var(--ink2)',fontSize:13.5}}>{res.err}</div>
      ) : (
        <div className="fade">
          <div className="card" style={{padding:18,marginTop:14}}>
            <div className="row"><span className="chip chip-now"><I.pin style={{width:12,height:12}}/>{res.scope}{res.st?' · '+res.st:''}</span><span className="spacer"></span><span style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>n={res.n} shops</span></div>
            <div style={{display:'flex',alignItems:'baseline',gap:8,marginTop:14}}>
              <div style={{fontSize:42,fontWeight:800,letterSpacing:'-1.4px'}}>{pctFmt(res.avgComp)}</div>
              <div style={{fontSize:14,color:'var(--muted)',fontWeight:700}}>{Math.round(res.avgComp*100)} bps avg</div>
            </div>
            <div className="row" style={{gap:8,marginTop:6}}>
              <span style={{fontSize:13,fontWeight:700,color:delta>=0?'var(--ok)':'var(--red)'}}>{delta>=0?'▲':'▼'} {Math.abs(delta*100).toFixed(0)} bps vs national</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:11,marginTop:16}}>
              <div className="stat"><div className="k">Avg monthly units</div><div className="v" style={{fontSize:20}}>{res.avgUnits!=null?res.avgUnits:'—'}</div></div>
              <div className="stat"><div className="k">National avg</div><div className="v" style={{fontSize:20}}>{pctFmt(nat.avgComp)}</div></div>
            </div>
          </div>
          <button className="btn btn-dark" style={{marginTop:12}} onClick={()=>useInCalc(Math.round(res.avgComp*100))}><I.calc/> Use {Math.round(res.avgComp*100)} bps in the calculator</button>
        </div>
      ))}
      <p style={{fontSize:11,color:'var(--muted)',marginTop:16,lineHeight:1.5}}>Source: Rocket Pro partner comp data as of {DATA_AS_OF}, aggregated across {nat.n.toLocaleString('en-US')} shops. Production refreshes from live Salesforce and Model Match data.</p>
    </Sub>
  );
}

/* ----- candidate profile from MU1 ----- */
const PROF_FIELDS = [
  {k:'company', label:'Company legal name', sf:'Account Name', ph:'Acme Mortgage LLC'},
  {k:'nmls', label:'NMLS company ID', sf:'NMLS_ID__c', ph:'1234567'},
  {k:'entity', label:'Entity type', sf:'Entity_Type__c', ph:'LLC'},
  {k:'ein', label:'EIN', sf:'Tax_ID__c', ph:'12-3456789'},
  {k:'qi', label:'Qualifying individual', sf:'Qualifying_Individual__c', ph:'Full name'},
  {k:'contact', label:'Primary contact', sf:'Contact', ph:'Full name'},
  {k:'email', label:'Email', sf:'Email', ph:'you@email.com'},
  {k:'phone', label:'Phone', sf:'Phone', ph:'(313) 555-0123'},
  {k:'address', label:'Business address', sf:'Billing Address', ph:'Street, City, ST'},
  {k:'states', label:'Licensed state(s)', sf:'Licensed_States__c', ph:'MI, OH, IN'},
];
function parseMU1(text){
  const f={}; if(!text) return f;
  const t=text.replace(/\s+/g,' ');
  const grab=(re)=>{const m=t.match(re); return m?m[1].trim():'';};
  const nmls=grab(/NMLS\s*(?:Unique\s*)?(?:ID|Identifier|#)?[:\s]*?(\d{4,8})/i); if(nmls) f.nmls=nmls;
  const ein=grab(/\b(\d{2}-\d{7})\b/); if(ein) f.ein=ein;
  const email=grab(/([\w.+-]+@[\w-]+\.[\w.-]+)/); if(email) f.email=email;
  const phone=grab(/(\(?\d{3}\)?[\s.\-]?\d{3}[\s.\-]?\d{4})/); if(phone) f.phone=phone;
  const company=grab(/(?:Company\s*)?Legal\s*Name[:\s]+([A-Za-z0-9 ,.&'\-]{3,60}?)(?:\s{2}|NMLS|EIN|Entity|$)/i); if(company) f.company=company;
  const entity=grab(/\b(Limited Liability Company|LLC|S[- ]?Corp(?:oration)?|C[- ]?Corp(?:oration)?|Corporation|Partnership|Sole Proprietor(?:ship)?)\b/i); if(entity) f.entity=entity;
  const qi=grab(/(?:Qualifying Individual|Designated (?:Broker|Individual))[:\s]+([A-Za-z .,'\-]{3,50}?)(?:\s{2}|NMLS|$)/i); if(qi) f.qi=qi;
  const states=grab(/(?:State[s]? of (?:Operation|Formation|Incorporation)|Licensed States?)[:\s]+([A-Z]{2}(?:\s*,\s*[A-Z]{2}){0,12})/); if(states) f.states=states;
  return f;
}
function Profile({prof,setProf}){
  const [busy,setBusy]=useState(false);
  const [note,setNote]=useState('');
  const set=(k,v)=>setProf(p=>({...p,fields:{...p.fields,[k]:v},saved:false}));
  const onFile=async(e)=>{
    const file=e.target.files&&e.target.files[0]; if(!file) return;
    setBusy(true); setProf(p=>({...p,fileName:file.name})); setNote('Reading '+file.name+'…');
    try{
      let text='';
      if(file.type==='application/pdf' && typeof pdfjsLib!=='undefined'){
        const buf=await file.arrayBuffer();
        const pdf=await pdfjsLib.getDocument({data:buf}).promise;
        for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();text+=c.items.map(x=>x.str).join(' ')+'\n';}
      }
      const found=parseMU1(text); const keys=Object.keys(found);
      setProf(p=>({...p,fileName:file.name,fields:{...p.fields,...found},auto:keys,saved:false}));
      setNote(keys.length? ('Auto-filled '+keys.length+' field'+(keys.length>1?'s':'')+' from your MU1 — confirm and edit below.') : (file.type==='application/pdf'?'Uploaded, but we couldn’t read fields automatically. Fill them in below.':'Please upload the MU1 as a PDF to auto-fill.'));
    }catch(err){ setNote('Could not read that file automatically. You can still fill the profile manually.'); }
    setBusy(false);
  };
  const filled = PROF_FIELDS.filter(x=>prof.fields[x.k]).length;
  return (
    <Sub back={null} title="Your profile" sub="Upload your NMLS MU1 and we’ll build your candidate profile — the same fields that sync to RocketPro Salesforce.">
      <label className="dropzone">
        <input type="file" accept="application/pdf" onChange={onFile} style={{display:'none'}}/>
        <div className="dz-ic"><I.doc/></div>
        <b>{prof.fileName?prof.fileName:'Upload your MU1 (PDF)'}</b>
        <small>{prof.fileName?'Tap to replace':'Tap to choose a file'}</small>
      </label>
      {note && <div className="card" style={{padding:'12px 14px',marginTop:12,fontSize:13,color:'var(--ink2)',display:'flex',gap:9,alignItems:'center'}}>{busy?<span className="spin"></span>:<I.spark style={{width:18,height:18,color:'var(--red)',flex:'0 0 18px'}}/>}<span>{note}</span></div>}

      <div className="row" style={{marginTop:18,marginBottom:4}}><span style={{fontSize:13,fontWeight:800}}>Candidate profile</span><span className="spacer"></span><span style={{fontSize:11.5,color:'var(--muted)',fontWeight:600}}>{filled}/{PROF_FIELDS.length} complete</span></div>
      {PROF_FIELDS.map(x=>(
        <div key={x.k} style={{marginTop:12}}>
          <div className="row"><label className="lbl" style={{margin:0}}>{x.label}</label>{prof.auto.includes(x.k)&&<span className="autochip"><I.spark style={{width:11,height:11}}/>From MU1</span>}<span className="spacer"></span><span className="sfmap">{x.sf}</span></div>
          <input className="field" value={prof.fields[x.k]||''} placeholder={x.ph} onChange={e=>set(x.k,e.target.value)} style={{marginTop:6}}/>
        </div>
      ))}

      {prof.saved ? (
        <div className="card" style={{marginTop:16,padding:15,background:'var(--green-soft)',border:'1px solid var(--green)'}}>
          <div style={{display:'flex',gap:9,alignItems:'center'}}><I.check style={{width:18,height:18,color:'var(--ok)'}}/><b style={{fontSize:14,color:'var(--green-ink)'}}>Profile saved · ready to sync</b></div>
          <p style={{fontSize:12,color:'var(--green-ink)',margin:'7px 0 0',lineHeight:1.5}}>These fields map 1:1 to your RocketPro Salesforce record. Sync is simulated in this prototype.</p>
        </div>
      ) : (
        <button className="btn btn-primary" style={{marginTop:16}} onClick={()=>setProf(p=>({...p,saved:true}))}><I.check/> Save profile</button>
      )}
      <p style={{fontSize:11,color:'var(--muted)',marginTop:12,lineHeight:1.5}}>Reading happens on your device. We pull what we can from the MU1; always confirm before saving. Production maps these straight into Salesforce so your PDM sees them instantly.</p>
    </Sub>
  );
}

      {approved && (
        <div className="card" style={{padding:'13px 15px',marginBottom:13,display:'flex',gap:10,alignItems:'center',background:'var(--green-soft)',border:'1px solid var(--green)'}}>
          <I.check style={{width:18,height:18,color:'var(--ok)',flex:'0 0 18px'}}/>
          <div style={{fontSize:12.5,color:'var(--green-ink)',lineHeight:1.5}}>You're approved with Rocket Pro. Your PDM has handed you off to your dedicated account executive.</div>
        </div>
      )}
      <div className="pdm">
        <div className="glow"></div>
        <div className="row" style={{gap:14,position:'relative'}}><Avatar photo={contact.photo} initials={contact.initials} size={64}/>
          <div><div style={{fontSize:19,fontWeight:800}}>{contact.name}</div><div style={{fontSize:12.5,opacity:.78}}>{contact.role}</div><div style={{fontSize:11.5,opacity:.6,marginTop:3}}>{contact.loc}</div></div></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginTop:16,position:'relative'}}>
          <a className="pa" href={'tel:+'+contact.phone}><I.phone/>Call</a>
          <a className="pa" href={'sms:+'+contact.phone}><I.chat/>Text</a>
          <a className="pa" href={'mailto:'+contact.email}><I.mail/>Email</a>
        </div>
      </div>

      <div className="card" style={{marginTop:12,overflow:'hidden'}}>
        <a className="lrow" href={'tel:+'+contact.phone}><div className="ic"><I.phone/></div><div style={{flex:1}}><b>{contact.phoneDisplay}</b><small>Call or text</small></div><I.chev style={{width:17,height:17,color:'var(--line2)'}}/></a>
        <a className="lrow" href={'mailto:'+contact.email}><div className="ic"><I.mail/></div><div style={{flex:1}}><b style={{fontSize:13,wordBreak:'break-all'}}>{contact.email}</b><small>Email</small></div><I.chev style={{width:17,height:17,color:'var(--line2)'}}/></a>
        {contact.linkedin && <a className="lrow" href={contact.linkedin} target="_blank" rel="noopener noreferrer"><div className="ic"><I.li/></div><div style={{flex:1}}><b>LinkedIn</b><small>Connect with {first}</small></div><I.ext style={{width:17,height:17,color:'var(--line2)'}}/></a>}
      </div>

      <h2 className="h2" style={{marginTop:22}}>Message {first}</h2>
      <div className="card" style={{marginTop:12,padding:14}}>
        <div className="thread">
          {msgs.map((m,i)=> m.from==='them' ? (
            <div key={i} style={{display:'flex',gap:9,marginBottom:11}}>
              <Avatar photo={contact.photo} initials={contact.initials} size={30}/>
              <div className="bubble them">{m.text}</div>
            </div>
          ) : (
            <div key={i} style={{display:'flex',gap:9,marginBottom:11,flexDirection:'row-reverse'}}>
              <div className="av" style={{width:30,height:30,flex:'0 0 30px',fontSize:12,background:'var(--mist)',color:'var(--ink)'}}>{myInit}</div>
              <div className="bubble me">{m.text}</div>
            </div>
          ))}
        </div>
        <div className="composer">
          <input value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={onKey} placeholder={'Message '+first+'…'}/>
          <button className={'sendbtn'+(draft.trim()?' on':'')} onClick={send} aria-label="Send" disabled={!draft.trim()}><I.send/></button>
        </div>
      </div>
      <p style={{textAlign:'center',fontSize:11,color:'var(--muted)',marginTop:12,lineHeight:1.5}}>Prototype · replies are simulated. Production threads sync to RocketPro Salesforce.</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
